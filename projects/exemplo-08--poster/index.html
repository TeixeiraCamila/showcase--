<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Pôsteres</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="header__title">Gerador de Pôsteres</h1>
      <p class="header__subtitle">Crie pôsteres para Notion</p>
    </header>

    <main class="main">
      <form class="form" id="form">
        <input class="form__input" type="text" id="title" placeholder="Título" required>
        
        <div class="form__row">
          <input class="form__input" type="text" id="year" placeholder="Ano" maxlength="4">
          <input class="form__input" type="text" id="genre" placeholder="Gênero">
        </div>
        
        <input class="form__input" type="text" id="nativeTitle" placeholder="Título Original">
        
        <div class="form__row">
          <input class="form__input" type="text" id="directedBy" placeholder="Diretor">
          <input class="form__input" type="text" id="writtenBy" placeholder="Escritor">
        </div>
        
        <input class="form__input" type="text" id="starring1" placeholder="Elenco 1">
        <input class="form__input" type="text" id="starring2" placeholder="Elenco 2">
        
        <div class="form__actions">
          <label class="btn btn--secondary">
            Escolher Imagem
            <input type="file" id="imageUpload" accept="image/*" hidden>
          </label>
          <button type="submit" class="btn btn--primary">Gerar</button>
          <button type="reset" class="btn btn--ghost">Limpar</button>
        </div>
      </form>

      <div class="preview">
        <div class="poster" id="poster">
          <div class="poster__image" id="posterImage">
            <span class="poster__placeholder">Adicione uma imagem</span>
          </div>
          <div class="poster__info">
            <div class="poster__title-row">
              <span class="poster__title" id="previewTitle"></span>
              <span class="poster__year" id="previewYear"></span>
            </div>
            <div class="poster__details" id="posterDetails"></div>
          </div>
        </div>
        <button class="btn btn--download u-hidden" id="downloadBtn">Baixar PNG</button>
      </div>
    </main>
  </div>

  <canvas id="canvas"></canvas>
  <div id="toast" class="toast"></div>

  <script src="./js/script.js"></script>
</body>
</html>
