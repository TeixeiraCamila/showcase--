<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create custom posters for movies and events for free">
  <meta name="keywords" content="poster maker, create poster, graphic design, movies">
  <meta name="author" content="Poster Maker">
  <meta name="robots" content="index, follow">

  <meta property="og:title" content="Poster Maker">
  <meta property="og:description" content="Create custom posters for movies and events for free">
  <meta property="og:type" content="website">
  <meta property="og:image" content="og-image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Poster Maker">
  <meta name="twitter:description" content="Create custom posters for movies and events for free">

  <title>Poster Maker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23D9D9D9' width='100' height='70' rx='4'/><text y='55' x='50' font-size='40' text-anchor='middle' fill='black'>P</text></svg>" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold text-black mb-8 text-center app__title">Poster Maker</h1>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 app__container">
      <div class="bg-white p-6 rounded-lg shadow-md form">
        <h2 class="text-xl font-semibold mb-4 form__title">Poster Data</h2>

        <div class="space-y-4">
          <div class="form__group">
            <label class="block text-sm font-medium mb-1 form__label">Image</label>
            <input type="file" id="input-image" accept="image/*" class="form__input">
          </div>

          <div class="form__group">
            <label class="block text-sm font-medium mb-1 form__label">Title</label>
            <input type="text" id="input-title" placeholder="Movie/Event Title" class="form__input">
          </div>

          <div class="form__group">
            <label class="block text-sm font-medium mb-1 form__label">Year</label>
            <input type="text" id="input-year" placeholder="2024" class="form__input">
          </div>

          <div class="form__group">
            <label class="block text-sm font-medium mb-1 form__label">Names (comma separated)</label>
            <input type="text" id="input-names" placeholder="Name 1, Name 2, Name 3" class="form__input">
          </div>

          <div class="form__group">
            <label class="block text-sm font-medium mb-1 form__label">Genre</label>
            <input type="text" id="input-genre" placeholder="Action, Drama, Comedy" class="form__input">
          </div>

          <div class="form__group">
            <label class="block text-sm font-medium mb-1 form__label">Directed by</label>
            <input type="text" id="input-director" placeholder="Director name" class="form__input">
          </div>
        </div>

        <div class="flex gap-4 mt-6 form__buttons">
          <button id="btn-preview" class="form__button form__button--primary">Preview</button>
          <button id="btn-download" class="form__button form__button--secondary">Download</button>
        </div>
      </div>

      <div class="flex justify-center items-start">
        <div id="poster-container" class="poster">
          <div id="poster-preview" class="poster__preview">
            <div id="poster-image" class="poster__image">
              <img src="" alt="Poster">
            </div>

            <div class="poster__info">
              <div class="flex items-baseline gap-4 poster__header">
                <h2 id="poster-title" class="poster__title">Title</h2>
                <span id="poster-year" class="poster__year">Year</span>
              </div>

              <p id="poster-genre" class="poster__genre">Genre</p>

              <div class="poster__section">
                <p class="poster__section-label">Cast</p>
                <p id="poster-names" class="poster__section-value">Names</p>
              </div>

              <div class="poster__section">
                <p class="poster__section-label">Directed by</p>
                <p id="poster-director" class="poster__section-value">Director</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>

</html>
